
# Supabase project configuration
project_id = "nclavsvzjzegqvkjezyz"

# Custom ports to avoid conflicts with other running Supabase projects
[api]
port = 54331
enabled = true

[db]
port = 54332

[studio]
port = 54333
enabled = true

[inbucket]
port = 54334
enabled = true

[functions.update-event]
  # Require Supabase JWT (anon key in Authorization) for platform check
  verify_jwt = true

[functions.paystack-webhook]
  verify_jwt = false

[functions.paystack-transfer-webhook]
  verify_jwt = false

[functions.expire-dg-redemption-intents]
  verify_jwt = false

[functions.csp-report]
  # Public browser endpoint for CSP violation reports.
  verify_jwt = false

# Keep verify_jwt enabled for remove-service-manager; it will receive
# Supabase JWT in Authorization and Privy JWT in X-Privy-Authorization.

[functions.is-admin]
  verify_jwt = true

[functions.init-paystack-transaction]
  verify_jwt = true

[functions.admin-get-transactions]
  verify_jwt = true

[functions.send-ticket-email]
  verify_jwt = true

[functions.send-post-notification]
  verify_jwt = true

[functions.nft-metadata]
  # Public endpoint - NFT marketplaces and wallets need unauthenticated access
  verify_jwt = false

[functions.get-event-discussions]
  # Browser calls this with Privy JWT (not Supabase JWT)
  verify_jwt = false

[functions.get-post-comments]
  # Browser calls this with Privy JWT (not Supabase JWT)
  verify_jwt = false

[functions.get-price-conversion]
  verify_jwt = false

[functions.search-linkable-events]
  # Public lookup for minimal event fields used by Ticket Pass linking.
  verify_jwt = false

[functions.ticket-pass-metadata]
  # Public endpoint - NFT marketplaces and wallets need unauthenticated access
  verify_jwt = false

[functions.list-nigerian-banks]
  # Public bank list used before a user has a Supabase JWT.
  verify_jwt = false

[functions.resolve-bank-account]
  # Public account-name lookup; Paystack secret remains server-side.
  verify_jwt = false

[functions.get-user-payout-account]
  # Browser sends Privy JWT; the function performs identity checks itself.
  verify_jwt = false

[functions.save-user-payout-account]
  # Browser sends Privy JWT; the function performs identity checks itself.
  verify_jwt = false

[functions.reveal-user-payout-account]
  # Browser sends Privy JWT; the function performs identity checks itself.
  verify_jwt = false

[functions.cancel-dg-redemption]
  # Browser sends Privy JWT; the function performs identity checks itself.
  verify_jwt = false

[functions.get-purchase-form-prefill]
  # Browser sends Privy JWT; the function validates wallet ownership itself.
  verify_jwt = false
